  - id: dog
    title_zh: 小狗云
    title_en: Dog clouds
    clouds:
      - image: dog-jin.jpg
        title_zh: 小今云
        title_en: Little Jin
        location_zh: 美国费城
        location_en: Philadelphia, USA
        time_zh: 2026年四月
        time_en: April 2026
        rarity_zh: 常见
        rarity_en: Common
        description_zh: >-
          在春天的草地上发现的一块特殊的八个月的小狗云，形状似骑士比熊犬，
          在费城大学城非常常见，会跟所有路上遇到的人类热情地打招呼。
        description_en: >-
          A special eight-month-old puppy cloud spotted on a spring lawn,
          shaped like a Cavalier King Charles bichon. Very common around
          University City Philadelphia and greets every human it meets
          with great enthusiasm.

      - image: dog-bei.jpg
        title_zh: 小贝云
        title_en: Little Bei
        location_zh: 中国南昌
        location_en: Nanchang, China
        time_zh: 2026年三月
        time_en: March 2026
        rarity_zh: 较为少见
        rarity_en: Somewhat rare
        description_zh: >-
          一块胖乎乎的五岁的比熊云，对陌生人类很害羞，需要耐心才能摸到。
        description_en: >-
          A round, five-year-old bichon-shaped cloud who is shy around
          strangers — patience is required before you're allowed to pet her.

      - image: dog-ali.jpg
        title_zh: 阿力云
        title_en: Ali
        location_zh: 中国南昌
        location_en: Nanchang, China
        time_zh: 2026年三月
        time_en: March 2026
        rarity_zh: 常见
        rarity_en: Common
        description_zh: >-
          对于每天要走什么路线非常有自己想法的一朵九岁的雪纳瑞云，
          但只要拿出卤牛肉（少盐）就一定可以摸到。
        description_en: >-
          A nine-year-old schnauzer-shaped cloud with very firm opinions
          about which route to walk each day — but a piece of low-salt
          braised beef will guarantee a successful petting.
