# Cloud Collection data
# ----------------------
# The page renders 13 sections in order. Each section contains a list of "clouds".
# A cloud entry can include:
#   image            – filename inside assets/img/clouds/
#   title_zh / title_en
#   location_zh / location_en
#   time_zh / time_en
#   rarity_zh / rarity_en       (稀有程度)
#   description_zh / description_en
#
# To add a new cloud:
#   1. Drop the photo in assets/img/clouds/ (use ASCII filenames like "cirrus-01.jpg").
#   2. Append a new item under the appropriate section's `clouds:` list.

sections:
